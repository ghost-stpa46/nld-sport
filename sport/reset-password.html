<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nouveau mot de passe — noLackinDiscipline</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #c8ff00; --bg: #0a0a0a; --surface: #111111; --surface2: #1a1a1a;
      --border: rgba(255,255,255,0.08); --text: #ffffff; --text-muted: #888888;
      --font-display: 'Bebas Neue', cursive; --font-body: 'Inter', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 420px; }
    .logo { font-family: var(--font-display); font-size: 48px; color: var(--accent); text-align: center; display: block; margin-bottom: 8px; }
    .title { font-family: var(--font-display); font-size: 26px; margin-bottom: 4px; }
    .sub { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
    .field-group { margin-bottom: 14px; }
    .field-group label { display: block; font-size: 12px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 7px; }
    .field-group input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; font-family: var(--font-body); font-size: 14px; color: var(--text); outline: none; }
    .field-group input:focus { border-color: rgba(200,255,0,0.4); }
    .btn { width: 100%; margin-top: 10px; padding: 14px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-family: var(--font-display); font-size: 18px; letter-spacing: 0.06em; cursor: pointer; }
    .btn:hover { opacity: 0.88; }
    .error-box { margin-top: 12px; padding: 12px 14px; background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.25); border-radius: 8px; font-size: 13px; color: #ff7070; display: none; }
    .success-box { margin-top: 12px; padding: 12px 14px; background: rgba(200,255,0,0.08); border: 1px solid rgba(200,255,0,0.2); border-radius: 8px; font-size: 13px; color: var(--accent); display: none; }
  </style>
</head>
<body>
  <div class="card">
    <span class="logo">NLD</span>
    <h2 class="title">Nouveau mot de passe.</h2>
    <p class="sub">Choisis un nouveau mot de passe sécurisé.</p>
    <form id="resetForm" onsubmit="handleReset(event)" novalidate>
      <div class="field-group">
        <label>Nouveau mot de passe</label>
        <input type="password" id="newPassword" placeholder="8 caractères minimum" required />
      </div>
      <div class="field-group">
        <label>Confirmer</label>
        <input type="password" id="confirmPassword" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn">Enregistrer</button>
    </form>
    <div class="error-box" id="errorBox"></div>
    <div class="success-box" id="successBox">Mot de passe mis à jour ! <a href="login.html" style="color:var(--accent)">Se connecter</a></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script type="module">
    import { sb } from './supabase-config.js';

    window.handleReset = async function(e) {
      e.preventDefault();
      const password = document.getElementById('newPassword').value;
      const confirm  = document.getElementById('confirmPassword').value;
      const errBox   = document.getElementById('errorBox');
      const okBox    = document.getElementById('successBox');

      errBox.style.display = 'none';
      okBox.style.display  = 'none';

      if (password.length < 8) { errBox.textContent = 'Minimum 8 caractères.'; errBox.style.display = 'block'; return; }
      if (password !== confirm) { errBox.textContent = 'Les mots de passe ne correspondent pas.'; errBox.style.display = 'block'; return; }

      const { error } = await sb.auth.updateUser({ password });
      if (error) { errBox.textContent = error.message; errBox.style.display = 'block'; return; }

      okBox.style.display = 'block';
      document.getElementById('resetForm').style.display = 'none';
    };
  </script>
</body>
</html>
