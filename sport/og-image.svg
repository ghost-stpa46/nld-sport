<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <!-- Grid overlay -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Glow orb -->
  <radialGradient id="orb" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#c8ff00" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#c8ff00" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="600" cy="315" rx="500" ry="300" fill="url(#orb)"/>
  <!-- NLD logo -->
  <text x="600" y="290" font-family="Arial Black, Arial, sans-serif" font-size="160" font-weight="900" fill="#c8ff00" text-anchor="middle" letter-spacing="8">NLD</text>
  <!-- Tagline -->
  <text x="600" y="370" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="6">NOLACKINDISCIPLINE</text>
  <!-- Subtitle -->
  <text x="600" y="430" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.3)" text-anchor="middle">Coaching sportif personnel · Nutrition · Mental</text>
</svg>
