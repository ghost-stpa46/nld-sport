<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — noLackinDiscipline</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #c8ff00;
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: rgba(255,255,255,0.08);
      --text: #ffffff;
      --text-muted: #888888;
      --font-display: 'Bebas Neue', cursive;
      --font-body: 'Inter', sans-serif;
      --red: #ff4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Background orbs */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: rgba(200,255,0,0.06);
      top: -150px; left: -150px;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: rgba(200,255,0,0.04);
      bottom: -100px; right: -100px;
    }

    /* Card */
    .login-card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(200,255,0,0.04);
    }

    .logo-block {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo {
      font-family: var(--font-display);
      font-size: 48px;
      letter-spacing: 0.04em;
      color: var(--accent);
      line-height: 1;
      display: block;
    }
    .logo-sub {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .login-title {
      font-family: var(--font-display);
      font-size: 28px;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
      color: var(--text);
    }
    .login-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    .field-group {
      margin-bottom: 16px;
    }
    .field-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .field-group input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .field-group input:focus {
      border-color: rgba(200,255,0,0.4);
    }
    .field-group input::placeholder { color: #444; }

    .btn-login {
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: var(--font-display);
      font-size: 18px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      position: relative;
    }
    .btn-login:hover { opacity: 0.88; }
    .btn-login:active { transform: scale(0.99); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-login .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
    }
    .btn-login.loading .spinner { display: block; }

    @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

    .error-box {
      margin-top: 14px;
      padding: 12px 14px;
      background: rgba(255,68,68,0.1);
      border: 1px solid rgba(255,68,68,0.25);
      border-radius: 8px;
      font-size: 13px;
      color: #ff7070;
      display: none;
    }
    .error-box.visible { display: block; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }

    @media (max-width: 480px) {
      .login-card { padding: 36px 24px; margin: 16px; }
    }
  </style>
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <div class="login-card">
    <div class="logo-block">
      <span class="logo">NLD</span>
      <span class="logo-sub">noLackinDiscipline</span>
    </div>

    <h2 class="login-title">Connexion</h2>
    <p class="login-subtitle">Accède à ton espace personnel.</p>

    <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
      <div class="field-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="ton@email.com" autocomplete="email" required />
      </div>
      <div class="field-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        Se connecter
        <span class="spinner"></span>
      </button>
    </form>

    <div class="error-box" id="errorBox"></div>

    <a href="index.html" class="back-link">← Retour au site</a>
  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script type="module">
    import { sb } from './supabase-config.js';

    async function handleLogin(e) {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('loginBtn');
      const errBox   = document.getElementById('errorBox');

      errBox.classList.remove('visible');

      if (!email || !password) {
        showError('Merci de remplir tous les champs.');
        return;
      }

      btn.disabled = true;
      btn.classList.add('loading');

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        btn.disabled = false;
        btn.classList.remove('loading');
        showError(getFriendlyError(error.message));
        return;
      }

      // Récupérer le rôle depuis la table profiles
      const { data: profile, error: profileError } = await sb
        .from('profiles')
        .select('role')
        .eq('id', data.user.id)
        .single();

      btn.disabled = false;
      btn.classList.remove('loading');

      if (profileError || !profile) {
        showError('Impossible de récupérer ton profil. Contacte ton coach.');
        return;
      }

      if (profile.role === 'coach') {
        window.location.href = 'dashboard-coach.html';
      } else if (profile.role === 'client') {
        window.location.href = 'dashboard-client.html';
      } else {
        showError('Rôle inconnu. Contacte l\'administrateur.');
      }
    }

    function showError(msg) {
      const box = document.getElementById('errorBox');
      box.textContent = msg;
      box.classList.add('visible');
    }

    function getFriendlyError(msg) {
      if (msg.includes('Invalid login credentials')) return 'Email ou mot de passe incorrect.';
      if (msg.includes('Email not confirmed'))       return 'Confirme ton email avant de te connecter.';
      if (msg.includes('Too many requests'))         return 'Trop de tentatives. Réessaie dans quelques minutes.';
      return 'Erreur de connexion. Réessaie.';
    }

    // Exposer globalement pour onsubmit inline
    window.handleLogin = handleLogin;

    // Si déjà connecté, rediriger directement
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        const { data: profile } = await sb
          .from('profiles')
          .select('role')
          .eq('id', session.user.id)
          .single();
        if (profile?.role === 'coach')  window.location.href = 'dashboard-coach.html';
        if (profile?.role === 'client') window.location.href = 'dashboard-client.html';
      }
    })();
  </script>
</body>
</html>
